<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Directory — Arrow Word Puzzles</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f0ff;color:#222;min-height:100vh}
nav{background:#7744bb;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.nav-brand{font-size:20px;font-weight:700;letter-spacing:-0.5px;text-decoration:none;color:#fff}
.nav-brand span{color:#e8d8ff}
.nav-links{display:flex;gap:8px;flex-wrap:wrap}
.nav-links a{color:#e8d8ff;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:14px;font-weight:500;transition:background .15s}
.nav-links a:hover{background:rgba(255,255,255,0.15)}
.nav-links a.active{background:rgba(255,255,255,0.2);color:#fff}
.page-header{background:#fff;border-bottom:1px solid #e8e0f0;padding:24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.page-header h1{font-size:22px;font-weight:700;color:#443366}
.page-header p{font-size:13px;color:#888;margin-top:2px}
main{max-width:1000px;margin:0 auto;padding:24px}

/* Solver overlay */
#solver-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;overflow-y:auto;padding:16px}
#solver-overlay.open{display:block}
.solver-box{background:#fff;border-radius:12px;max-width:900px;margin:0 auto;overflow:hidden}
.solver-header{background:#7744bb;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.solver-header h2{font-size:17px;font-weight:700;margin:0}
.solver-close{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:14px;font-weight:600}
.solver-close:hover{background:rgba(255,255,255,0.35)}
.solver-body{padding:16px}

/* Directory grid */
.dir-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.dir-toolbar input{flex:1;min-width:180px;padding:8px 12px;font-size:14px;border:1px solid #ccc;border-radius:6px}
.dir-toolbar select{padding:8px 10px;font-size:13px;border:1px solid #ccc;border-radius:6px;background:#fff}
.puzzle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.pcard{background:#fff;border:1px solid #e0d8f0;border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s,transform .12s}
.pcard:hover{box-shadow:0 4px 18px rgba(119,68,187,0.15);transform:translateY(-2px)}
.pcard-title{font-size:15px;font-weight:700;color:#443366;line-height:1.3}
.pcard-meta{font-size:11px;color:#aaa}
.pcard-size{font-size:11px;color:#888;background:#f0ecff;display:inline-block;padding:2px 8px;border-radius:4px}
.pcard-btns{display:flex;gap:6px;margin-top:4px}
.btn-solve{flex:1;background:#7744bb;color:#fff;border:none;border-radius:6px;padding:9px;font-size:13px;font-weight:600;cursor:pointer}
.btn-solve:hover{background:#6633aa}
.btn-remove{background:#fff;border:1px solid #f4a8a8;color:#c00;border-radius:6px;padding:9px 10px;font-size:12px;cursor:pointer}
.btn-remove:hover{background:#fdd}
.empty-state{text-align:center;padding:64px 24px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state p{font-size:15px;line-height:1.6;margin-bottom:20px}
.empty-state a{color:#7744bb;font-weight:600;text-decoration:none}
.empty-state a:hover{text-decoration:underline}
.count-line{font-size:12px;color:#999;margin-bottom:12px}

/* Solver content inside overlay */
.solve-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.solve-toolbar button{padding:8px 14px;font-size:13px;cursor:pointer;border:1px solid #bbb;border-radius:5px;background:#fff}
.solve-toolbar button:hover{background:#eee}
.solve-toolbar button.green{background:#d4f0d4;color:#1a6e1a;border-color:#7bc07b}
.solve-toolbar button.warn{background:#ffe0e0;color:#900;border-color:#f4a8a8}
.zoom-bar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.zoom-bar span{font-size:12px;color:#666}
.zoom-bar button{padding:5px 10px;font-size:12px;cursor:pointer;border:1px solid #bbb;border-radius:4px;background:#fff;min-width:34px}
.grid-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid #e0e0e0;background:#f9f9f9;border-radius:6px;padding:6px;margin-bottom:8px}
table.puzzle{border-collapse:collapse;table-layout:fixed}
table.puzzle td{border:1px solid #aaa;position:relative;user-select:none;padding:0;overflow:hidden;vertical-align:top}
td.t-empty{background:#fff}
td.t-black{background:#333}
td.t-clue{background:#e8e0f0;cursor:pointer}
td.t-clue:hover{background:#ddd0ee}
td.t-answer{background:#eaf5e4;vertical-align:middle;text-align:center}
.clue-inner{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}
.clue-slot{display:flex;flex:1 1 0;min-height:0;overflow:hidden;padding:1px 2px;cursor:pointer}
.clue-slot:hover{background:rgba(119,68,187,0.08)}
.clue-slot.active-clue{background:rgba(119,68,187,0.18)}
.clue-slot.ap-right{flex-direction:row;align-items:center;justify-content:center}
.clue-slot.ap-left{flex-direction:row;align-items:center;justify-content:center}
.clue-slot.ap-left .slot-arrow{order:-1}
.clue-slot.ap-bottom{flex-direction:column;align-items:center;justify-content:center}
.clue-slot.ap-top{flex-direction:column;align-items:center;justify-content:center}
.clue-slot.ap-top .slot-arrow{order:-1}
.slot-text{font-weight:600;color:#443366;overflow:hidden;flex:0 1 auto;line-height:1.15;text-align:center;overflow-wrap:normal;word-break:normal;hyphens:none}
.clue-slot.ap-right .slot-text,.clue-slot.ap-left .slot-text{flex:1 1 auto}
.slot-arrow{flex-shrink:0;display:block;line-height:0}
.slot-arrow svg{display:block}
.clue-divider{height:1px;background:#9966cc;opacity:0.6;flex-shrink:0;margin:0 2px}
.solve-input{width:100%;height:100%;border:none;background:transparent;text-align:center;font-weight:600;color:#222;outline:none;text-transform:uppercase;display:block;cursor:text}
.solve-input:focus{background:#fffde0}
.solve-input.wrong{background:#ffd0d8;color:#a01030}
.solve-input.in-active-word{background:#fff5b8}
.solve-input.active-cell,.solve-input:focus.active-cell{background:#ffe680}
#celebrate{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;padding:16px}
#celebrate .cel-box{background:#fff;border-radius:10px;padding:24px;width:340px;max-width:95vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Arrow<span>Word</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="directory.html" class="active">Puzzles</a>
    <a href="builder.html">Builder</a>
  </div>
</nav>

<div class="page-header">
  <div>
    <h1>📖 Puzzle Directory</h1>
    <p>All puzzles published from this browser</p>
  </div>
  <a href="builder.html" style="background:#7744bb;color:#fff;text-decoration:none;padding:10px 18px;border-radius:7px;font-size:14px;font-weight:600">+ Create puzzle</a>
</div>

<main>
  <div class="dir-toolbar">
    <input type="text" id="search" placeholder="Search puzzles…" oninput="renderDir()">
    <select id="sort-by" onchange="renderDir()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="alpha">A–Z</option>
    </select>
  </div>
  <div class="count-line" id="count-line"></div>
  <div class="puzzle-grid" id="puzzle-grid"></div>
</main>

<!-- Solver overlay -->
<div id="solver-overlay">
  <div class="solver-box">
    <div class="solver-header">
      <h2 id="solver-title">Puzzle</h2>
      <button class="solver-close" onclick="closeSolver()">✕ Close</button>
    </div>
    <div class="solver-body">
      <div class="solve-toolbar">
        <button class="green" onclick="window.print()">🖨 Print</button>
        <button onclick="solverCheckAnswers()">Check answers</button>
        <button onclick="solverReveal()">Reveal answers</button>
        <button class="warn" onclick="solverClear()">Clear</button>
      </div>
      <div class="zoom-bar">
        <span>Zoom:</span>
        <button onclick="sZoomBy(-0.15)">−</button>
        <button onclick="sSetZoom(1)">100%</button>
        <button onclick="sZoomBy(0.15)">+</button>
        <button onclick="sZoomFit()">Fit</button>
        <span id="s-zoom-val">100%</span>
      </div>
      <div class="grid-wrap" id="solver-grid-wrap">
        <div id="s-zoom-wrap" style="transform-origin:top left;display:inline-block">
          <table class="puzzle" id="solver-grid"></table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Celebration -->
<div id="celebrate">
  <div class="cel-box">
    <div style="font-size:48px;margin-bottom:8px">🎉</div>
    <h2 style="color:#1a6e1a;margin-bottom:8px">Puzzle complete!</h2>
    <p style="font-size:14px;color:#444;margin-bottom:16px">Every letter is correct. Well done!</p>
    <button onclick="document.getElementById('celebrate').style.display='none'" style="background:#7744bb;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer">Close</button>
  </div>
</div>

<script src="puzzles.js"></script>
<script>
// ── Shared arrow word solver logic ─────────────────────────────────────────────
function arrowSVG(dir,s){
  const c=s/2,m=Math.ceil(s*0.12),e=s-m,sw=Math.max(1.6,s/12),ah=s*0.34;
  function head(x,y,dx,dy){const l=Math.sqrt(dx*dx+dy*dy),nx=dx/l,ny=dy/l,px=-ny,py=nx;return`M${x-nx*ah+px*ah*0.45},${y-ny*ah+py*ah*0.45} L${x},${y} L${x-nx*ah-px*ah*0.45},${y-ny*ah-py*ah*0.45}`;}
  const paths={right:[`M${m},${c} L${e},${c}`,head(e,c,1,0)],left:[`M${e},${c} L${m},${c}`,head(m,c,-1,0)],down:[`M${c},${m} L${c},${e}`,head(c,e,0,1)],up:[`M${c},${e} L${c},${m}`,head(c,m,0,-1)],'right-down':[`M${m},${c} L${c},${c} L${c},${e}`,head(c,e,0,1)],'down-right':[`M${c},${m} L${c},${c} L${e},${c}`,head(e,c,1,0)],'left-down':[`M${e},${c} L${c},${c} L${c},${e}`,head(c,e,0,1)],'down-left':[`M${c},${m} L${c},${c} L${m},${c}`,head(m,c,-1,0)],'right-up':[`M${m},${c} L${c},${c} L${c},${m}`,head(c,m,0,-1)],'up-right':[`M${c},${e} L${c},${c} L${e},${c}`,head(e,c,1,0)],'left-up':[`M${e},${c} L${c},${c} L${c},${m}`,head(c,m,0,-1)],'up-left':[`M${c},${e} L${c},${c} L${m},${c}`,head(m,c,-1,0)]};
  const[p,a]=paths[dir]||paths.right;
  return`<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg"><path d="${p}" stroke="#7744bb" stroke-width="${sw}" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="${a}" stroke="#7744bb" stroke-width="${sw}" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
const EAPOS={right:'right',left:'left',down:'bottom',up:'top','right-down':'right','down-right':'bottom','left-down':'left','down-left':'bottom','right-up':'right','up-right':'top','left-up':'left','up-left':'top'};
function eAPC(dir,isMulti){let p=EAPOS[dir]||'right';if(isMulti&&(p==='top'||p==='bottom'))p='right';if(p==='left')return'ap-left';if(p==='bottom')return'ap-bottom';if(p==='top')return'ap-top';return'ap-right';}
function getWordCells(dir,ans,or,oc){
  const len=ans.length,cells=[];
  if(dir==='right'){for(let i=0;i<len;i++)cells.push([or,oc+1+i]);}
  else if(dir==='left'){for(let i=0;i<len;i++)cells.push([or,oc-len+i]);}
  else if(dir==='down'){for(let i=0;i<len;i++)cells.push([or+1+i,oc]);}
  else if(dir==='up'){for(let i=0;i<len;i++)cells.push([or-len+i,oc]);}
  else if(dir==='right-down'){cells.push([or,oc+1]);for(let i=1;i<len;i++)cells.push([or+i,oc+1]);}
  else if(dir==='down-right'){cells.push([or+1,oc]);for(let i=1;i<len;i++)cells.push([or+1,oc+i]);}
  else if(dir==='left-down'){cells.push([or,oc-1]);for(let i=1;i<len;i++)cells.push([or+i,oc-1]);}
  else if(dir==='down-left'){const t=[[or+1,oc]];for(let i=1;i<len;i++)t.push([or+1,oc-i]);t.sort((a,b)=>a[1]-b[1]);cells.push(...t);}
  else if(dir==='right-up'){const t=[[or,oc+1]];for(let i=1;i<len;i++)t.push([or-i,oc+1]);t.sort((a,b)=>a[0]-b[0]);cells.push(...t);}
  else if(dir==='up-right'){const t=[[or-1,oc]];for(let i=1;i<len;i++)t.push([or-1,oc+i]);cells.push(...t);}
  else if(dir==='left-up'){const t=[[or,oc-1]];for(let i=1;i<len;i++)t.push([or-i,oc-1]);t.sort((a,b)=>a[0]-b[0]);cells.push(...t);}
  else if(dir==='up-left'){const t=[[or-1,oc]];for(let i=1;i<len;i++)t.push([or-1,oc-i]);t.sort((a,b)=>a[1]-b[1]);cells.push(...t);}
  return cells;
}

// ── Directory render ───────────────────────────────────────────────────────────
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderDir(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const sort=document.getElementById('sort-by').value;
  let list=getRegistry();
  if(q) list=list.filter(p=>p.title.toLowerCase().includes(q));
  if(sort==='oldest') list=[...list].reverse();
  else if(sort==='alpha') list=[...list].sort((a,b)=>a.title.localeCompare(b.title));
  document.getElementById('count-line').textContent=list.length+' puzzle'+(list.length===1?'':'s');
  const grid=document.getElementById('puzzle-grid');
  if(!list.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">📭</div>
      <p>${q?'No puzzles match your search.':'No puzzles published yet.<br>Head to the builder and click <strong>Publish to web</strong>.'}</p>
      <a href="builder.html">Open the builder →</a>
    </div>`;
    return;
  }
  grid.innerHTML=list.map(p=>{
    const d=p.data||{};
    const size=d.rows&&d.cols?`${d.cols}×${d.rows}`:'';
    return`<div class="pcard">
      <div class="pcard-title">${escHtml(p.title)}</div>
      <div class="pcard-meta">Published ${p.publishedAt}</div>
      ${size?`<div class="pcard-size">${size} grid</div>`:''}
      <div class="pcard-btns">
        <button class="btn-solve" onclick="openSolver('${p.id}')">Solve →</button>
        <button class="btn-remove" onclick="removePuzzle('${p.id}')" title="Remove from directory">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function removePuzzle(id){
  const p=getFromRegistry(id);
  if(!p)return;
  if(!confirm('Remove "'+p.title+'" from the directory?'))return;
  removeFromRegistry(id);
  renderDir();
}

// ── Solver ─────────────────────────────────────────────────────────────────────
let sWords=[], sActive=null, sCurZoom=1, sCurData=null;

function openSolver(id){
  const entry=getFromRegistry(id);
  if(!entry){alert('Puzzle not found.');return;}
  sCurData=entry;
  document.getElementById('solver-title').textContent=entry.title;
  buildSolverGrid(entry.data);
  document.getElementById('solver-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>{sZoomFit();},80);
  // handle ?id= in URL for direct linking
  history.replaceState(null,'','directory.html?id='+id);
}

function closeSolver(){
  document.getElementById('solver-overlay').classList.remove('open');
  document.body.style.overflow='';
  history.replaceState(null,'','directory.html');
}

function buildSolverGrid(data){
  const rows=data.rows,cols=data.cols;
  const cSz=data.cellSizePx||64,tSz=data.textSizePx||12;
  const arSz=Math.max(10,Math.round(cSz*0.24));
  sWords=[];sActive=null;
  const G2=[];
  for(let r=0;r<rows;r++){G2.push([]);for(let c=0;c<cols;c++)G2[r].push({t:'empty',clues:[],answerOf:null});}
  data.cells.forEach(cell=>{
    if(cell.t==='black'){G2[cell.r][cell.c].t='black';}
    else if(cell.t==='clue'){
      G2[cell.r][cell.c]={t:'clue',clues:cell.clues.map(cl=>({...cl})),answerOf:null};
      cell.clues.forEach((cl,ci)=>{
        const wcells=getWordCells(cl.dir,cl.ans,cell.r,cell.c).filter(([ar,ac])=>ar>=0&&ar<rows&&ac>=0&&ac<cols);
        sWords.push({or:cell.r,oc:cell.c,ci,cells:wcells,ans:cl.ans});
        wcells.forEach(([ar,ac],i)=>{
          if(G2[ar][ac].t==='answer')G2[ar][ac].letter2=cl.ans[i];
          else G2[ar][ac]={t:'answer',clues:[],answerOf:{letter:cl.ans[i]}};
        });
      });
    }
  });
  const sz=`width:${cSz}px;height:${cSz}px;min-width:${cSz}px;min-height:${cSz}px;max-width:${cSz}px;max-height:${cSz}px`;
  const tbl=document.getElementById('solver-grid');
  tbl.innerHTML='';
  for(let r=0;r<rows;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<cols;c++){
      const cell=G2[r][c];
      const td=document.createElement('td');
      td.style.cssText=sz.split(';').join(';');
      if(cell.t==='black'){td.className='t-black';}
      else if(cell.t==='clue'){
        td.className='t-clue';
        const inner=document.createElement('div');inner.className='clue-inner';
        const isMulti=cell.clues.length>1;
        cell.clues.forEach((cl,idx)=>{
          if(idx>0){const dv=document.createElement('div');dv.className='clue-divider';inner.appendChild(dv);}
          const slot=document.createElement('div');
          slot.className='clue-slot '+eAPC(cl.dir,isMulti);
          slot.dataset.or=r;slot.dataset.oc=c;slot.dataset.ci=idx;
          slot.style.flex=(cl.textSize&&cl.textSize>0?cl.textSize:tSz)+' 1 0';
          const fs=cl.textSize&&cl.textSize>0?cl.textSize:tSz;
          slot.innerHTML=`<div class="slot-text" style="font-size:${fs}px">${escHtml(cl.clue||'?')}</div><div class="slot-arrow">${arrowSVG(cl.dir,arSz)}</div>`;
          slot.addEventListener('click',()=>sPickClue(parseInt(slot.dataset.or),parseInt(slot.dataset.oc),parseInt(slot.dataset.ci)));
          inner.appendChild(slot);
        });
        td.appendChild(inner);
      } else if(cell.t==='answer'){
        td.className='t-answer';
        const inp=document.createElement('input');
        inp.className='solve-input';inp.type='text';inp.maxLength=1;
        inp.dataset.r=r;inp.dataset.c=c;
        inp.style.fontSize=Math.round(cSz*0.38)+'px';
        inp.setAttribute('autocapitalize','characters');inp.setAttribute('autocomplete','off');inp.setAttribute('autocorrect','off');inp.setAttribute('spellcheck','false');
        inp.addEventListener('input',sSolveInput);
        inp.addEventListener('keydown',sSolveKeydown);
        inp.addEventListener('focus',sSolveFocus);
        td.appendChild(inp);
      } else {td.className='t-empty';}
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  setTimeout(()=>{document.querySelectorAll('#solver-grid .clue-slot').forEach(sls=>{const t=sls.querySelector('.slot-text');if(!t)return;let fs=parseFloat(t.style.fontSize)||10;let s=40;while(s-->0&&fs>4&&(sls.scrollWidth>sls.clientWidth+1||sls.scrollHeight>sls.clientHeight+1)){fs-=0.5;t.style.fontSize=fs+'px';}});},30);
}

function sGetInp(r,c){return document.querySelector('#solver-grid input.solve-input[data-r="'+r+'"][data-c="'+c+'"]');}

function sPickClue(or,oc,ci){
  const w=sWords.find(x=>x.or===or&&x.oc===oc&&x.ci===ci);if(!w)return;
  sActive={or,oc,ci,cells:w.cells,ans:w.ans,idx:0};
  sHighlight();
  const inp=sGetInp(w.cells[0][0],w.cells[0][1]);
  if(inp){inp.focus();inp.select();}
}

function sHighlight(){
  document.querySelectorAll('#solver-grid .solve-input').forEach(i=>{i.classList.remove('in-active-word','active-cell');});
  document.querySelectorAll('#solver-grid .clue-slot').forEach(s=>s.classList.remove('active-clue'));
  if(!sActive)return;
  sActive.cells.forEach(([r,c],i)=>{const inp=sGetInp(r,c);if(inp){inp.classList.add('in-active-word');if(i===sActive.idx)inp.classList.add('active-cell');}});
  const slot=document.querySelector('#solver-grid .clue-slot[data-or="'+sActive.or+'"][data-oc="'+sActive.oc+'"][data-ci="'+sActive.ci+'"]');
  if(slot)slot.classList.add('active-clue');
}

function sSolveFocus(e){
  const inp=e.target;inp.classList.remove('wrong');
  const r=parseInt(inp.dataset.r),c=parseInt(inp.dataset.c);
  if(sActive){const i=sActive.cells.findIndex(([a,b])=>a===r&&b===c);if(i>=0){sActive.idx=i;sHighlight();return;}}
  const w=sWords.find(x=>x.cells.some(([a,b])=>a===r&&b===c));
  if(w){sActive={or:w.or,oc:w.oc,ci:w.ci,cells:w.cells,ans:w.ans,idx:w.cells.findIndex(([a,b])=>a===r&&b===c)};if(sActive.idx<0)sActive.idx=0;sHighlight();}
}

function sSolveInput(e){
  const inp=e.target;
  inp.value=(inp.value||'').slice(-1).toUpperCase().replace(/[^A-Z]/,'');
  inp.classList.remove('wrong');
  if(inp.value&&sActive){
    const next=sActive.idx+1;
    if(next<sActive.cells.length){sActive.idx=next;const[nr,nc]=sActive.cells[next];const nInp=sGetInp(nr,nc);if(nInp){nInp.focus();nInp.select();}}
    else sHighlight();
  }
  sMaybeCelebrate();
}

function sSolveKeydown(e){
  const inp=e.target;
  if(e.key==='Backspace'){if(inp.value)return;if(sActive&&sActive.idx>0){e.preventDefault();sActive.idx--;const[pr,pc]=sActive.cells[sActive.idx];const pInp=sGetInp(pr,pc);if(pInp){pInp.value='';pInp.classList.remove('wrong');pInp.focus();pInp.select();}}}
  else if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(sActive&&sActive.idx<sActive.cells.length-1){e.preventDefault();sActive.idx++;const[nr,nc]=sActive.cells[sActive.idx];const nInp=sGetInp(nr,nc);if(nInp){nInp.focus();nInp.select();}}}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(sActive&&sActive.idx>0){e.preventDefault();sActive.idx--;const[pr,pc]=sActive.cells[sActive.idx];const pInp=sGetInp(pr,pc);if(pInp){pInp.focus();pInp.select();}}}
}

function sMaybeCelebrate(){
  const inputs=document.querySelectorAll('#solver-grid td.t-answer input');
  if(!inputs.length)return;
  for(let i=0;i<inputs.length;i++){
    const want=inputs[i].closest('td').querySelector('input').className;
    const td=inputs[i].closest('td');
    const ansCell=td;
    // get answer from grid data via data-r/data-c
    const r=parseInt(inputs[i].dataset.r),c=parseInt(inputs[i].dataset.c);
    const w=sWords.find(x=>x.cells.some(([a,b])=>a===r&&b===c));
    if(!w)return;
    const idx=w.cells.findIndex(([a,b])=>a===r&&b===c);
    const correct=w.ans[idx]||'';
    const got=(inputs[i].value||'').toUpperCase();
    if(!got||got!==correct)return;
  }
  if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();
  sActive=null;sHighlight();
  document.getElementById('celebrate').style.display='flex';
}

function solverCheckAnswers(){
  let wrong=0,filled=0;
  document.querySelectorAll('#solver-grid td.t-answer input').forEach(inp=>{
    const r=parseInt(inp.dataset.r),c=parseInt(inp.dataset.c);
    const got=(inp.value||'').toUpperCase();
    if(!got){inp.classList.remove('wrong');return;}
    filled++;
    const w=sWords.find(x=>x.cells.some(([a,b])=>a===r&&b===c));
    if(!w){return;}
    const idx=w.cells.findIndex(([a,b])=>a===r&&b===c);
    const correct=w.ans[idx]||'';
    if(got!==correct){inp.classList.add('wrong');wrong++;}else inp.classList.remove('wrong');
  });
  if(filled===0)alert('No letters typed yet.');
  else alert(`${filled-wrong} correct, ${wrong} wrong (out of ${filled} typed).`);
}

function solverReveal(){
  if(!confirm('Reveal all answers?'))return;
  sWords.forEach(w=>{w.cells.forEach(([r,c],i)=>{const inp=sGetInp(r,c);if(inp){inp.value=w.ans[i];inp.classList.remove('wrong');}});});
}

function solverClear(){
  if(!confirm('Clear all your answers?'))return;
  document.querySelectorAll('#solver-grid .solve-input').forEach(i=>{i.value='';i.classList.remove('wrong');});
  sActive=null;sHighlight();
}

// ── Solver zoom ────────────────────────────────────────────────────────────────
function sApplyZoom(){
  const w=document.getElementById('s-zoom-wrap');
  if(w)w.style.transform='scale('+sCurZoom+')';
  const v=document.getElementById('s-zoom-val');
  if(v)v.textContent=Math.round(sCurZoom*100)+'%';
  const tbl=document.querySelector('#solver-grid');
  if(tbl&&w){const tw=tbl.offsetWidth,th=tbl.offsetHeight;if(tw>0&&th>0){w.style.width=(tw*sCurZoom)+'px';w.style.height=(th*sCurZoom)+'px';}}
}
function sSetZoom(z){sCurZoom=Math.max(0.25,Math.min(3,z));sApplyZoom();}
function sZoomBy(d){sSetZoom(sCurZoom+d);}
function sZoomFit(){
  const wrap=document.getElementById('solver-grid-wrap');
  const tbl=document.getElementById('solver-grid');
  if(!wrap||!tbl)return;
  const avail=wrap.clientWidth-20;
  sSetZoom(Math.min(1,avail/Math.max(1,tbl.offsetWidth)));
}

// ── Init ───────────────────────────────────────────────────────────────────────
renderDir();

// Check for ?id= in URL to open a puzzle directly
(function(){
  const id=new URLSearchParams(location.search).get('id');
  if(id)setTimeout(()=>openSolver(id),100);
})();
